name: zamechaniya

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zamechaniya
      POSTGRES_USER: zamechaniya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zamechaniya_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zamechaniya -d zamechaniya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://zamechaniya:${POSTGRES_PASSWORD:-zamechaniya_secret}@postgres:5432/zamechaniya
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-1024}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.doc,.docx,.xls,.xlsx,.xlsm,.pdf,.jpg,.jpeg,.png,.txt}
      DEV_ADMIN_USERNAME: ${DEV_ADMIN_USERNAME:-admin}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-admin}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER: ${LDAP_SERVER:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-(&(objectClass=user)(sAMAccountName={username}))}
      LDAP_GROUP_GIP: ${LDAP_GROUP_GIP:-}
      LDAP_GROUP_DEPARTMENT_HEAD: ${LDAP_GROUP_DEPARTMENT_HEAD:-}
      LDAP_GROUP_ADMIN: ${LDAP_GROUP_ADMIN:-}
      SEED_TEST_USERS: ${SEED_TEST_USERS:-false}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-test123}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
